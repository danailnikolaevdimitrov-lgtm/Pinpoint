<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Pinpoint — Profile</title>
    <link rel="icon" type="image/png" href="assets/logo.png">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
    <style>
        .pr-page {
            position: relative;
            z-index: 1;
            max-width: 720px;
            margin: 0 auto;
            padding: 20px 24px 88px;
        }

        /* ── Nav ── */
        .pr-nav {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 40px;
            flex-wrap: wrap;
            gap: 10px;
        }
        .pr-nav-left { display: flex; align-items: center; gap: 14px; }
        .pr-back {
            font-size: 13px;
            font-weight: 600;
            color: rgba(240,240,240,0.45);
            text-decoration: none;
            transition: color 0.2s;
        }
        .pr-back:hover { color: #38a0ff; }
        .pr-nav-sep {
            width: 1px;
            height: 16px;
            background: rgba(255,255,255,0.12);
        }

        /* ── Hero ── */
        .pr-hero {
            display: flex;
            align-items: center;
            gap: 22px;
            margin-bottom: 40px;
            flex-wrap: wrap;
        }
        .pr-avatar {
            width: 72px;
            height: 72px;
            border-radius: 50%;
            background: linear-gradient(135deg, #0d83ef, #025aa5);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 28px;
            font-weight: 800;
            color: #fff;
            flex-shrink: 0;
            box-shadow: 0 0 0 3px rgba(56,160,255,0.25), 0 8px 28px rgba(2,117,216,0.4);
        }
        .pr-hero-info {}
        .pr-username {
            font-size: 26px;
            font-weight: 800;
            letter-spacing: -0.7px;
            background: linear-gradient(140deg, #fff 20%, #38a0ff 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 4px;
        }
        .pr-since {
            font-size: 12px;
            color: rgba(240,240,240,0.35);
            font-weight: 500;
        }
        .pr-you-badge {
            display: inline-block;
            margin-left: 10px;
            font-size: 10px;
            font-weight: 700;
            letter-spacing: 0.8px;
            text-transform: uppercase;
            background: rgba(2,117,216,0.25);
            color: #38a0ff;
            border: 1px solid rgba(56,160,255,0.3);
            border-radius: 6px;
            padding: 2px 7px;
            vertical-align: middle;
        }

        /* ── Overall stats bar ── */
        .pr-overall {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 12px;
            margin-bottom: 32px;
        }
        .pr-overall-stat {
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.09);
            border-radius: 14px;
            padding: 18px 16px;
            text-align: center;
        }
        .pr-overall-val {
            font-size: 28px;
            font-weight: 800;
            color: #f0f0f0;
            letter-spacing: -1px;
            line-height: 1;
            margin-bottom: 5px;
        }
        .pr-overall-lbl {
            font-size: 11px;
            font-weight: 600;
            letter-spacing: 0.8px;
            text-transform: uppercase;
            color: rgba(240,240,240,0.35);
        }

        /* ── Section label ── */
        .pr-section-lbl {
            font-size: 10px;
            font-weight: 700;
            letter-spacing: 1.8px;
            text-transform: uppercase;
            color: rgba(240,240,240,0.3);
            margin-bottom: 14px;
        }

        /* ── Difficulty cards ── */
        .pr-diff-cards {
            display: flex;
            flex-direction: column;
            gap: 14px;
            margin-bottom: 0;
        }
        .pr-diff-card {
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.09);
            border-radius: 18px;
            overflow: hidden;
        }
        .pr-diff-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 16px 20px 12px;
            border-bottom: 1px solid rgba(255,255,255,0.06);
        }
        .pr-diff-name {
            display: flex;
            align-items: center;
            gap: 10px;
            font-size: 15px;
            font-weight: 700;
            color: #f0f0f0;
        }
        .pr-diff-badge {
            font-size: 18px;
            line-height: 1;
        }
        .pr-win-rate {
            font-size: 12px;
            font-weight: 600;
            color: rgba(240,240,240,0.35);
        }
        .pr-win-rate b { color: #f0f0f0; }

        .pr-diff-stats {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 0;
        }
        .pr-stat-cell {
            padding: 14px 20px;
            border-right: 1px solid rgba(255,255,255,0.06);
            border-bottom: 1px solid rgba(255,255,255,0.06);
        }
        .pr-stat-cell:nth-child(2n) { border-right: none; }
        .pr-stat-cell:nth-last-child(-n+2) { border-bottom: none; }

        .pr-stat-val {
            font-size: 20px;
            font-weight: 800;
            color: #f0f0f0;
            letter-spacing: -0.5px;
            line-height: 1;
            margin-bottom: 4px;
        }
        .pr-stat-val.muted { color: rgba(240,240,240,0.25); font-size: 16px; font-weight: 600; }
        .pr-stat-lbl {
            font-size: 11px;
            font-weight: 600;
            color: rgba(240,240,240,0.35);
            letter-spacing: 0.3px;
        }

        /* ── No games played ── */
        .pr-empty {
            text-align: center;
            padding: 28px 20px;
            color: rgba(240,240,240,0.28);
            font-size: 13px;
        }

        /* ── Loading / error ── */
        .pr-state {
            text-align: center;
            padding: 80px 24px;
            color: rgba(240,240,240,0.35);
            font-size: 14px;
        }
        .pr-state .state-icon { font-size: 40px; display: block; margin-bottom: 14px; }

        /* ── Win progress bar ── */
        .pr-bar-wrap {
            height: 4px;
            background: rgba(255,255,255,0.07);
            border-radius: 2px;
            margin-top: 8px;
            overflow: hidden;
        }
        .pr-bar-fill {
            height: 100%;
            border-radius: 2px;
            background: linear-gradient(90deg, #0d83ef, #38a0ff);
            transition: width 0.6s ease;
        }

        @media (max-width: 560px) {
            .pr-overall { grid-template-columns: repeat(3, 1fr); gap: 8px; }
            .pr-overall-val { font-size: 22px; }
            .pr-overall-stat { padding: 14px 10px; }
            .pr-diff-stats { grid-template-columns: repeat(2, 1fr); }
            .pr-stat-cell { padding: 12px 14px; }
            .pr-stat-val { font-size: 17px; }
        }
    </style>
</head>
<body class="menu-page">

<div class="bg"></div>

<div class="pr-page">

    <div id="pr-content">
        <div class="pr-state">
            <span class="state-icon">⏳</span>Loading profile…
        </div>
    </div>

</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<script src="supabase.js"></script>
<script src="navbar.js"></script>
<script>
    const DIFFS = [
        { key: 'tourist',   label: 'Tourist',   icon: '🌿' },
        { key: 'navigator', label: 'Navigator', icon: '🗺️' },
        { key: 'legend',    label: 'Legend',    icon: '⚡' },
    ];

    // ── Auth bar ─────────────────────────────────────────────
    let myUserId = null;
    let myUsername = null;

    async function initMySession() {
        const { data: { session } } = await db.auth.getSession();
        if (!session) return;
        myUserId = session.user.id;
        const { data: prof } = await db
            .from('profiles').select('username').eq('id', session.user.id).single();
        if (prof) myUsername = prof.username;
    }

    // ── Load profile ─────────────────────────────────────────
    async function loadProfile() {
        const params   = new URLSearchParams(window.location.search);
        const username = params.get('u');

        if (!username) {
            document.getElementById('pr-content').innerHTML =
                '<div class="pr-state"><span class="state-icon">❓</span>No username specified.</div>';
            return;
        }

        document.title = `Pinpoint — ${username}`;

        // Fetch profile row
        const { data: profile, error: profileErr } = await db
            .from('profiles')
            .select('id, username, created_at')
            .eq('username', username)
            .maybeSingle();

        if (profileErr || !profile) {
            document.getElementById('pr-content').innerHTML =
                '<div class="pr-state"><span class="state-icon">🔍</span>Player not found.</div>';
            return;
        }

        // Fetch all games for this user
        const { data: games, error: gamesErr } = await db
            .from('games')
            .select('difficulty, won, winning_distance_km, attempts_used, completed_at')
            .eq('user_id', profile.id);

        if (gamesErr) {
            document.getElementById('pr-content').innerHTML =
                '<div class="pr-state"><span class="state-icon">⚠️</span>Failed to load stats.</div>';
            return;
        }

        render(profile, games || []);
    }

    // ── Compute stats ─────────────────────────────────────────
    function statsForDiff(games, diff) {
        const all  = games.filter(g => g.difficulty === diff);
        const wins = all.filter(g => g.won);
        const losses = all.filter(g => !g.won);

        if (all.length === 0) return null;

        const bestDist  = wins.length ? Math.min(...wins.map(g => g.winning_distance_km)) : null;
        const avgDist   = wins.length ? wins.reduce((s, g) => s + g.winning_distance_km, 0) / wins.length : null;
        const bestAttempts = wins.length ? Math.min(...wins.map(g => g.attempts_used)) : null;
        const avgAttempts  = wins.length ? wins.reduce((s, g) => s + g.attempts_used, 0) / wins.length : null;

        return {
            played: all.length,
            wins: wins.length,
            losses: losses.length,
            winRate: Math.round((wins.length / all.length) * 100),
            bestDist, avgDist,
            bestAttempts, avgAttempts,
        };
    }

    function fmt(val, decimals = 2, suffix = '') {
        if (val === null || val === undefined) return '—';
        return val.toFixed(decimals) + suffix;
    }

    // ── Render ────────────────────────────────────────────────
    function render(profile, games) {
        const isMe = myUsername && myUsername.toLowerCase() === profile.username.toLowerCase();

        const totalWins   = games.filter(g => g.won).length;
        const totalPlayed = games.length;
        const totalLosses = totalPlayed - totalWins;
        const memberSince = new Date(profile.created_at)
            .toLocaleDateString('en-GB', { day: 'numeric', month: 'long', year: 'numeric' });

        // Avatar letter
        const avatarLetter = profile.username[0].toUpperCase();

        // ── Hero HTML ──
        const heroHtml = `
            <div class="pr-hero anim anim-d1">
                <div class="pr-avatar">${escHtml(avatarLetter)}</div>
                <div class="pr-hero-info">
                    <div class="pr-username">
                        ${escHtml(profile.username)}
                        ${isMe ? '<span class="pr-you-badge">You</span>' : ''}
                    </div>
                    <div class="pr-since">Member since ${memberSince}</div>
                </div>
            </div>`;

        // ── Overall stats ──
        const overallHtml = `
            <div class="pr-overall anim anim-d2">
                <div class="pr-overall-stat">
                    <div class="pr-overall-val">${totalWins}</div>
                    <div class="pr-overall-lbl">Total Wins</div>
                </div>
                <div class="pr-overall-stat">
                    <div class="pr-overall-val">${totalLosses}</div>
                    <div class="pr-overall-lbl">Losses</div>
                </div>
                <div class="pr-overall-stat">
                    <div class="pr-overall-val">${totalPlayed ? Math.round((totalWins / totalPlayed) * 100) + '%' : '—'}</div>
                    <div class="pr-overall-lbl">Win Rate</div>
                </div>
            </div>`;

        // ── Difficulty cards ──
        const diffCardsHtml = DIFFS.map(d => {
            const s = statsForDiff(games, d.key);

            if (!s) {
                return `
                    <div class="pr-diff-card">
                        <div class="pr-diff-header">
                            <div class="pr-diff-name">
                                <span class="pr-diff-badge">${d.icon}</span>${d.label}
                            </div>
                        </div>
                        <div class="pr-empty">No games played on this difficulty yet.</div>
                    </div>`;
            }

            const barWidth = s.winRate;
            return `
                <div class="pr-diff-card">
                    <div class="pr-diff-header">
                        <div class="pr-diff-name">
                            <span class="pr-diff-badge">${d.icon}</span>${d.label}
                        </div>
                        <div class="pr-win-rate">
                            <b>${s.wins}</b> W &nbsp;·&nbsp; <b>${s.losses}</b> L
                            &nbsp;·&nbsp; <b>${s.winRate}%</b>
                        </div>
                    </div>
                    <div class="pr-bar-wrap" style="margin:0 20px 0; border-radius:0;">
                        <div class="pr-bar-fill" style="width:${barWidth}%"></div>
                    </div>
                    <div class="pr-diff-stats">
                        <div class="pr-stat-cell">
                            <div class="pr-stat-val ${s.bestDist === null ? 'muted' : ''}">
                                ${s.bestDist !== null ? s.bestDist.toFixed(3) + ' km' : '—'}
                            </div>
                            <div class="pr-stat-lbl">Best Distance</div>
                        </div>
                        <div class="pr-stat-cell">
                            <div class="pr-stat-val ${s.avgDist === null ? 'muted' : ''}">
                                ${s.avgDist !== null ? s.avgDist.toFixed(2) + ' km' : '—'}
                            </div>
                            <div class="pr-stat-lbl">Avg Distance (wins)</div>
                        </div>
                        <div class="pr-stat-cell">
                            <div class="pr-stat-val ${s.bestAttempts === null ? 'muted' : ''}">
                                ${s.bestAttempts !== null ? s.bestAttempts + (s.bestAttempts === 1 ? ' attempt' : ' attempts') : '—'}
                            </div>
                            <div class="pr-stat-lbl">Fewest Attempts</div>
                        </div>
                        <div class="pr-stat-cell">
                            <div class="pr-stat-val ${s.avgAttempts === null ? 'muted' : ''}">
                                ${s.avgAttempts !== null ? s.avgAttempts.toFixed(1) : '—'}
                            </div>
                            <div class="pr-stat-lbl">Avg Attempts (wins)</div>
                        </div>
                    </div>
                </div>`;
        }).join('');

        document.getElementById('pr-content').innerHTML = `
            ${heroHtml}
            ${overallHtml}
            <div class="pr-section-lbl anim anim-d3">Performance by Difficulty</div>
            <div class="pr-diff-cards anim anim-d4">${diffCardsHtml}</div>`;
    }

    function escHtml(str) {
        return String(str)
            .replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')
            .replace(/"/g,'&quot;').replace(/'/g,'&#039;');
    }

    initMySession().then(() => loadProfile());
</script>
</body>
</html>
