<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Pinpoint — Sign In</title>
    <link rel="icon" type="image/png" href="assets/logo.png">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
    <style>
        .auth-wrap {
            min-height: calc(100vh - 48px);
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 24px;
        }
        .auth-card {
            width: 100%;
            max-width: 400px;
            background: rgba(255,255,255,0.06);
            border: 1px solid rgba(255,255,255,0.13);
            backdrop-filter: blur(42px);
            -webkit-backdrop-filter: blur(42px);
            border-radius: 24px;
            padding: 40px 36px;
            display: flex;
            flex-direction: column;
            gap: 20px;
        }
        .auth-logo {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            margin-bottom: 4px;
        }
        .auth-logo img {
            width: 38px;
            height: 38px;
            object-fit: contain;
            filter: drop-shadow(0 0 14px rgba(2,117,216,0.5));
        }
        .auth-logo span {
            font-size: 26px;
            font-weight: 800;
            letter-spacing: -1px;
            background: linear-gradient(140deg, #ffffff 20%, #38a0ff 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        /* Tab switcher */
        .auth-tabs {
            display: flex;
            background: rgba(255,255,255,0.06);
            border-radius: 10px;
            padding: 3px;
            gap: 3px;
        }
        .auth-tab {
            flex: 1;
            padding: 8px;
            font-size: 13px;
            font-weight: 600;
            font-family: 'Inter', sans-serif;
            color: rgba(240,240,240,0.5);
            background: transparent;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            transition: background 0.2s, color 0.2s;
        }
        .auth-tab.active {
            background: rgba(255,255,255,0.1);
            color: #f0f0f0;
        }
        /* Form */
        .auth-form {
            display: flex;
            flex-direction: column;
            gap: 14px;
        }
        .auth-form label {
            font-size: 12px;
            font-weight: 600;
            color: rgba(240,240,240,0.6);
            letter-spacing: 0.4px;
            text-transform: uppercase;
            margin-bottom: 2px;
            display: block;
        }
        .auth-form input {
            width: 100%;
            padding: 11px 14px;
            font-size: 14px;
            font-family: 'Inter', sans-serif;
            background: rgba(255,255,255,0.07);
            border: 1px solid rgba(255,255,255,0.14);
            border-radius: 10px;
            color: #f0f0f0;
            outline: none;
            transition: border-color 0.2s, box-shadow 0.2s;
        }
        .auth-form input:focus {
            border-color: rgba(56,160,255,0.6);
            box-shadow: 0 0 0 3px rgba(2,117,216,0.2);
        }
        .auth-form input::placeholder { color: rgba(240,240,240,0.25); }
        .auth-submit {
            margin-top: 4px;
            padding: 13px;
            font-size: 15px;
            font-weight: 700;
            font-family: 'Inter', sans-serif;
            color: #fff;
            background: linear-gradient(135deg, #0d83ef 0%, #025aa5 100%);
            border: none;
            border-radius: 12px;
            cursor: pointer;
            box-shadow: 0 6px 24px rgba(2,117,216,0.45);
            transition: transform 0.15s, box-shadow 0.15s;
        }
        .auth-submit:hover { transform: translateY(-1px); box-shadow: 0 10px 30px rgba(2,117,216,0.6); }
        .auth-submit:active { transform: scale(0.98); }
        .auth-submit:disabled { opacity: 0.55; cursor: not-allowed; transform: none; }
        /* Field hint */
        .field-hint { display: block; margin-top: 5px; font-size: 11px; color: rgba(240,240,240,0.35); }
        /* Error / success message */
        .auth-msg {
            font-size: 13px;
            font-weight: 500;
            text-align: center;
            padding: 10px 14px;
            border-radius: 8px;
            display: none;
        }
        .auth-msg.error   { background: rgba(217,83,79,0.18); color: #f08080; display: block; }
        .auth-msg.success { background: rgba(92,184,92,0.18); color: #90ee90; display: block; }
        /* Back link */
        .auth-back {
            text-align: center;
            font-size: 13px;
            color: rgba(240,240,240,0.4);
        }
        .auth-back a {
            color: #38a0ff;
            text-decoration: none;
            font-weight: 600;
        }
        .auth-back a:hover { text-decoration: underline; }

        @media (max-width: 440px) {
            .auth-card { padding: 30px 20px; border-radius: 18px; }
        }
    </style>
</head>
<body class="menu-page">

<div class="bg"></div>

<div class="auth-wrap">
    <div class="auth-card">

        <div class="auth-logo">
            <img src="assets/logo.png" alt="Pinpoint">
            <span>Pinpoint</span>
        </div>

        <div class="auth-tabs">
            <button class="auth-tab active" id="tab-login"    onclick="showTab('login')">Sign In</button>
            <button class="auth-tab"        id="tab-register" onclick="showTab('register')">Register</button>
        </div>

        <div id="msg" class="auth-msg"></div>

        <!-- Sign In form -->
        <form class="auth-form" id="form-login" onsubmit="handleLogin(event)">
            <div>
                <label for="login-email">Email</label>
                <input type="email" id="login-email" placeholder="you@example.com" required autocomplete="email">
            </div>
            <div>
                <label for="login-password">Password</label>
                <input type="password" id="login-password" placeholder="••••••••" required autocomplete="current-password">
            </div>
            <button type="submit" class="auth-submit" id="btn-login">Sign In</button>
        </form>

        <!-- Register form -->
        <form class="auth-form" id="form-register" style="display:none;" onsubmit="handleRegister(event)">
            <div>
                <label for="reg-username">Username</label>
                <input type="text" id="reg-username" placeholder="CoolPlayer99" required
                       minlength="3" maxlength="20" pattern="[A-Za-z0-9_]+"
                       title="3–20 characters, letters, numbers and underscores only">
            </div>
            <div>
                <label for="reg-email">Email</label>
                <input type="email" id="reg-email" placeholder="you@example.com" required autocomplete="email">
                <small class="field-hint">Use a real email &mdash; it&rsquo;s the only way to recover your account.</small>
            </div>
            <div>
                <label for="reg-password">Password</label>
                <input type="password" id="reg-password" placeholder="Min 8 characters" required
                       minlength="8" autocomplete="new-password">
            </div>
            <button type="submit" class="auth-submit" id="btn-register">Create Account</button>
        </form>

        <div class="auth-back" style="display:none;"></div>

    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<script src="supabase.js"></script>
<script src="navbar.js"></script>
<script>
    if (new URLSearchParams(window.location.search).get('tab') === 'register') showTab('register');

    // ── Friendly error messages ────────────────────────────────
    function friendlyError(msg) {
        if (!msg) return 'Something went wrong. Please try again.';
        const m = msg.toLowerCase();
        if (m.includes('invalid login credentials'))       return 'Incorrect email or password.';
        if (m.includes('email not confirmed'))             return 'Please confirm your email before signing in.';
        if (m.includes('user already registered'))        return 'An account with this email already exists.';
        if (m.includes('already registered'))             return 'An account with this email already exists.';
        if (m.includes('password should be at least'))    return 'Password must be at least 8 characters.';
        if (m.includes('unable to validate email') ||
            m.includes('invalid format'))                  return 'Please enter a valid email address.';
        if (m.includes('for security purposes') ||
            m.includes('email rate limit'))                return 'Too many attempts — please wait a moment.';
        if (m.includes('network') || m.includes('fetch')) return 'Network error — check your connection.';
        return 'Something went wrong. Please try again.';
    }

    // ── Safe redirect target (prevents open-redirect abuse) ───
    function safeFrom(from) {
        if (from && /^[a-zA-Z0-9_-]+\.html(\?[^#]*)?$/.test(from)) return from;
        return 'index.html';
    }
    const _from = safeFrom(new URLSearchParams(window.location.search).get('from'));

    // ── Tab switching ─────────────────────────────────────────
    function showTab(tab) {
        const isLogin = tab === 'login';
        document.getElementById('form-login').style.display    = isLogin ? 'flex' : 'none';
        document.getElementById('form-register').style.display = isLogin ? 'none' : 'flex';
        document.getElementById('tab-login').classList.toggle('active', isLogin);
        document.getElementById('tab-register').classList.toggle('active', !isLogin);
        clearMsg();
    }

    function showMsg(text, type) {
        const el = document.getElementById('msg');
        el.textContent = text;
        el.className = 'auth-msg ' + type;
    }
    function clearMsg() {
        const el = document.getElementById('msg');
        el.textContent = '';
        el.className = 'auth-msg';
    }

    // If already logged in, redirect straight to destination
    db.auth.getSession().then(({ data }) => {
        if (data.session) window.location.href = _from;
    });

    // ── Sign In ───────────────────────────────────────────────
    async function handleLogin(e) {
        e.preventDefault();
        const btn = document.getElementById('btn-login');
        btn.disabled = true;
        btn.textContent = 'Signing in…';
        clearMsg();

        const email    = document.getElementById('login-email').value.trim();
        const password = document.getElementById('login-password').value;

        try {
            const { data, error } = await db.auth.signInWithPassword({ email, password });
            if (error) throw error;
            if (!data.session) throw new Error('Sign-in failed. Please try again.');
            showMsg('Signed in! Redirecting…', 'success');
            setTimeout(() => window.location.href = _from, 800);
        } catch (err) {
            showMsg(friendlyError(err.message), 'error');
            btn.disabled = false;
            btn.textContent = 'Sign In';
        }
    }

    // ── Register ──────────────────────────────────────────────
    async function handleRegister(e) {
        e.preventDefault();
        const btn = document.getElementById('btn-register');
        btn.disabled = true;
        btn.textContent = 'Creating account…';
        clearMsg();

        const username = document.getElementById('reg-username').value.trim();
        const email    = document.getElementById('reg-email').value.trim();
        const password = document.getElementById('reg-password').value;

        // Check username is not already taken
        const { data: existing } = await db
            .from('profiles')
            .select('id')
            .eq('username', username)
            .maybeSingle();

        if (existing) {
            showMsg('That username is already taken.', 'error');
            btn.disabled = false;
            btn.textContent = 'Create Account';
            return;
        }

        // Create auth user — the DB trigger creates the profile row automatically
        try {
            const { data, error } = await db.auth.signUp({
                email,
                password,
                options: { data: { username } }
            });
            if (error) throw error;
            if (!data.session) throw new Error('Account could not be confirmed. Try signing in instead.');
            showMsg('Account created! Signing you in\u2026', 'success');
            setTimeout(() => window.location.href = _from, 1000);
        } catch (err) {
            showMsg(friendlyError(err.message), 'error');
            btn.disabled = false;
            btn.textContent = 'Create Account';
        }
    }
</script>
</body>
</html>
