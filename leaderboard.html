<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Pinpoint — Leaderboards</title>
    <link rel="icon" type="image/png" href="assets/logo.png">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
    <style>
        .lb-page {
            position: relative;
            z-index: 1;
            max-width: 760px;
            margin: 0 auto;
            padding: 20px 24px 88px;
        }

        /* ── Page header ── */
        .lb-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 36px;
            flex-wrap: wrap;
            gap: 12px;
        }
        .lb-title {
            font-size: 28px;
            font-weight: 800;
            letter-spacing: -0.8px;
            background: linear-gradient(140deg, #fff 20%, #38a0ff 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        .lb-back {
            font-size: 13px;
            font-weight: 600;
            color: rgba(240,240,240,0.5);
            text-decoration: none;
            display: inline-flex;
            align-items: center;
            gap: 5px;
            transition: color 0.2s;
        }
        .lb-back:hover { color: #38a0ff; }

        /* ── Leaderboard type tabs ── */
        .lb-type-tabs {
            display: flex;
            gap: 8px;
            margin-bottom: 20px;
            flex-wrap: wrap;
        }
        .lb-type-tab {
            flex: 1;
            min-width: 120px;
            padding: 12px 10px;
            font-size: 13px;
            font-weight: 700;
            font-family: 'Inter', sans-serif;
            color: rgba(240,240,240,0.45);
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 12px;
            cursor: pointer;
            text-align: center;
            transition: background 0.2s, color 0.2s, border-color 0.2s;
        }
        .lb-type-tab .tab-icon { font-size: 18px; display: block; margin-bottom: 4px; }
        .lb-type-tab.active {
            background: rgba(2,117,216,0.18);
            border-color: rgba(56,160,255,0.45);
            color: #f0f0f0;
        }
        .lb-type-tab:hover:not(.active) { background: rgba(255,255,255,0.09); color: rgba(240,240,240,0.75); }

        /* ── Difficulty sub-tabs ── */
        .lb-diff-tabs {
            display: flex;
            background: rgba(255,255,255,0.05);
            border-radius: 10px;
            padding: 3px;
            gap: 3px;
            margin-bottom: 20px;
        }
        .lb-diff-tab {
            flex: 1;
            padding: 7px;
            font-size: 12px;
            font-weight: 700;
            font-family: 'Inter', sans-serif;
            color: rgba(240,240,240,0.4);
            background: transparent;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            transition: background 0.2s, color 0.2s;
        }
        .lb-diff-tab.active { background: rgba(255,255,255,0.1); color: #f0f0f0; }
        .lb-diff-tab:hover:not(.active) { color: rgba(240,240,240,0.7); }

        /* ── Table card ── */
        .lb-card {
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.1);
            backdrop-filter: blur(32px);
            -webkit-backdrop-filter: blur(32px);
            border-radius: 18px;
            overflow: hidden;
        }

        /* ── Loading / empty states ── */
        .lb-state {
            text-align: center;
            padding: 56px 24px;
            color: rgba(240,240,240,0.35);
            font-size: 14px;
        }
        .lb-state .state-icon { font-size: 36px; display: block; margin-bottom: 12px; }

        /* ── Leaderboard table ── */
        .lb-table {
            width: 100%;
            border-collapse: collapse;
        }
        .lb-table thead th {
            font-size: 10px;
            font-weight: 700;
            letter-spacing: 1.4px;
            text-transform: uppercase;
            color: rgba(240,240,240,0.35);
            padding: 14px 20px;
            text-align: left;
            border-bottom: 1px solid rgba(255,255,255,0.07);
        }
        .lb-table thead th:last-child { text-align: right; }

        .lb-table tbody tr {
            border-bottom: 1px solid rgba(255,255,255,0.05);
            transition: background 0.15s;
        }
        .lb-table tbody tr:last-child { border-bottom: none; }
        .lb-table tbody tr:hover { background: rgba(255,255,255,0.04); }

        .lb-table tbody td {
            padding: 13px 20px;
            font-size: 13px;
            color: rgba(240,240,240,0.8);
            vertical-align: middle;
        }
        .lb-table tbody td:last-child { text-align: right; font-weight: 600; color: #f0f0f0; }

        /* Rank cell */
        .rank-cell {
            font-size: 13px;
            font-weight: 700;
            color: rgba(240,240,240,0.35);
            width: 48px;
        }
        .rank-cell.top3 { color: #f0f0f0; }
        .rank-medal { font-size: 18px; line-height: 1; }

        /* Username cell */
        .username-cell {
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .username-cell a {
            color: rgba(240,240,240,0.85);
            text-decoration: none;
            font-weight: 600;
            transition: color 0.15s;
        }
        .username-cell a:hover { color: #38a0ff; }

        /* Date cell */
        .date-cell {
            font-size: 11px;
            color: rgba(240,240,240,0.3);
        }

        /* ── "You" highlighted row ── */
        .lb-table tbody tr.is-me {
            background: rgba(2,117,216,0.12);
        }
        .lb-table tbody tr.is-me td { color: #f0f0f0; }
        .you-badge {
            font-size: 9px;
            font-weight: 700;
            letter-spacing: 0.8px;
            text-transform: uppercase;
            background: rgba(2,117,216,0.35);
            color: #38a0ff;
            border: 1px solid rgba(56,160,255,0.3);
            border-radius: 6px;
            padding: 2px 6px;
        }

        /* ── Pinned "your rank" row outside top 100 ── */
        .lb-pinned {
            border-top: 1px solid rgba(255,255,255,0.1);
            background: rgba(2,117,216,0.08);
        }
        .lb-pinned td { padding: 13px 20px; font-size: 13px; color: rgba(240,240,240,0.75); }
        .lb-pinned td:last-child { text-align: right; font-weight: 600; color: #f0f0f0; }

        @media (max-width: 560px) {
            .lb-header { margin-bottom: 24px; }
            .lb-title { font-size: 22px; }
            .lb-type-tab { font-size: 11px; padding: 10px 8px; min-width: 90px; }
            .lb-table thead th,
            .lb-table tbody td { padding: 10px 12px; }
            .date-cell { display: none; }
        }
    </style>
</head>
<body class="menu-page">

<div class="bg"></div>

<div class="lb-page">

    <div class="lb-header anim anim-d1">
        <h1 class="lb-title">🏆 Leaderboards</h1>
    </div>

    <!-- Leaderboard type tabs -->
    <div class="lb-type-tabs anim anim-d2">
        <button class="lb-type-tab active" data-lb="wins">
            <span class="tab-icon">🥇</span>Most Wins
        </button>
        <button class="lb-type-tab" data-lb="distance">
            <span class="tab-icon">🎯</span>Closest Win
        </button>
        <button class="lb-type-tab" data-lb="attempts">
            <span class="tab-icon">⚡</span>Fewest Attempts
        </button>
    </div>

    <!-- Difficulty sub-tabs -->
    <div class="lb-diff-tabs anim anim-d3">
        <button class="lb-diff-tab" data-diff="tourist">🌿 Tourist</button>
        <button class="lb-diff-tab active" data-diff="navigator">🗺️ Navigator</button>
        <button class="lb-diff-tab" data-diff="legend">⚡ Legend</button>
    </div>

    <!-- Table -->
    <div class="lb-card anim anim-d4">
        <div id="lb-content">
            <div class="lb-state">
                <span class="state-icon">⏳</span>Loading…
            </div>
        </div>
    </div>

</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<script src="supabase.js"></script>
<script src="navbar.js"></script>
<script>
    // ── State ────────────────────────────────────────────────
    let currentLb   = 'wins';
    let currentDiff = 'navigator';
    let myUsername  = null;

    // ── Auth bar ─────────────────────────────────────────────
    db.auth.getSession().then(async ({ data: { session } }) => {
        if (!session) return;
        const { data: prof } = await db.from('profiles').select('username').eq('id', session.user.id).single();
        if (prof) myUsername = prof.username;
    });

    // ── Tab switching ─────────────────────────────────────────
    document.querySelectorAll('.lb-type-tab').forEach(btn => {
        btn.addEventListener('click', () => {
            document.querySelectorAll('.lb-type-tab').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            currentLb = btn.dataset.lb;
            loadLeaderboard();
        });
    });

    document.querySelectorAll('.lb-diff-tab').forEach(btn => {
        btn.addEventListener('click', () => {
            document.querySelectorAll('.lb-diff-tab').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            currentDiff = btn.dataset.diff;
            loadLeaderboard();
        });
    });

    // ── Helpers ───────────────────────────────────────────────
    const MEDALS = ['🥇', '🥈', '🥉'];

    function formatDate(iso) {
        const d = new Date(iso);
        return d.toLocaleDateString('en-GB', { day: 'numeric', month: 'short', year: 'numeric' });
    }

    function statLabel() {
        if (currentLb === 'wins')     return 'Wins';
        if (currentLb === 'distance') return 'Distance';
        return 'Attempts';
    }

    function formatStat(row) {
        if (currentLb === 'wins')     return row.wins + ' win' + (row.wins !== 1 ? 's' : '');
        if (currentLb === 'distance') return row.winning_distance_km.toFixed(3) + ' km';
        return row.attempts_used + (row.attempts_used === 1 ? ' attempt' : ' attempts');
    }

    function statDate(row) {
        if (currentLb === 'wins')     return formatDate(row.first_win_at);
        return formatDate(row.completed_at);
    }

    // ── Fetch & render ────────────────────────────────────────
    async function loadLeaderboard() {
        document.getElementById('lb-content').innerHTML =
            '<div class="lb-state"><span class="state-icon">⏳</span>Loading…</div>';

        const viewMap = {
            wins:     { view: 'leaderboard_wins',     order: [{ col: 'wins', asc: false }, { col: 'first_win_at', asc: true }] },
            distance: { view: 'leaderboard_distance', order: [{ col: 'winning_distance_km', asc: true }, { col: 'completed_at', asc: true }] },
            attempts: { view: 'leaderboard_attempts', order: [{ col: 'attempts_used', asc: true }, { col: 'completed_at', asc: true }] },
        };

        const { view, order } = viewMap[currentLb];

        // Fetch top 100
        let query = db.from(view).select('*').eq('difficulty', currentDiff);
        order.forEach(o => { query = query.order(o.col, { ascending: o.asc }); });
        query = query.limit(100);

        const { data: rows, error } = await query;

        if (error) {
            document.getElementById('lb-content').innerHTML =
                '<div class="lb-state"><span class="state-icon">⚠️</span>Failed to load. Try refreshing.</div>';
            return;
        }

        if (!rows || rows.length === 0) {
            document.getElementById('lb-content').innerHTML =
                '<div class="lb-state"><span class="state-icon">🎮</span>No results yet.<br>Be the first to play!</div>';
            return;
        }

        // Check if logged-in user is in top 100
        const myIndex = myUsername ? rows.findIndex(r => r.username === myUsername) : -1;

        // Fetch user's own row if not in top 100
        let myRow = null;
        if (myUsername && myIndex === -1) {
            const { data: myData } = await db
                .from(view).select('*')
                .eq('difficulty', currentDiff)
                .eq('username', myUsername)
                .maybeSingle();
            myRow = myData;
        }

        // ── Build table ──
        const thead = `
            <thead>
                <tr>
                    <th>#</th>
                    <th>Player</th>
                    <th class="date-cell">${currentLb === 'wins' ? 'First Win' : 'Achieved'}</th>
                    <th>${statLabel()}</th>
                </tr>
            </thead>`;

        const tbody = rows.map((row, i) => {
            const rank    = i + 1;
            const isMe    = myUsername && row.username === myUsername;
            const rankCell = rank <= 3
                ? `<span class="rank-medal">${MEDALS[rank - 1]}</span>`
                : `<span style="color:rgba(240,240,240,0.3)">${rank}</span>`;

            return `
                <tr class="${isMe ? 'is-me' : ''}">
                    <td class="rank-cell ${rank <= 3 ? 'top3' : ''}">${rankCell}</td>
                    <td>
                        <div class="username-cell">
                            <a href="profile.html?u=${encodeURIComponent(row.username)}">${escHtml(row.username)}</a>
                            ${isMe ? '<span class="you-badge">You</span>' : ''}
                        </div>
                    </td>
                    <td class="date-cell">${statDate(row)}</td>
                    <td>${formatStat(row)}</td>
                </tr>`;
        }).join('');

        // Pinned user row (outside top 100)
        const pinnedRow = (myRow && myIndex === -1) ? `
            <tr class="lb-pinned">
                <td class="rank-cell"><span style="color:rgba(240,240,240,0.3)">&gt;100</span></td>
                <td>
                    <div class="username-cell">
                        <a href="profile.html?u=${encodeURIComponent(myRow.username)}">${escHtml(myRow.username)}</a>
                        <span class="you-badge">You</span>
                    </div>
                </td>
                <td class="date-cell">${statDate(myRow)}</td>
                <td>${formatStat(myRow)}</td>
            </tr>` : '';

        document.getElementById('lb-content').innerHTML = `
            <table class="lb-table">
                ${thead}
                <tbody>${tbody}</tbody>
            </table>
            ${pinnedRow ? `<table class="lb-table">${pinnedRow}</table>` : ''}`;
    }

    function escHtml(str) {
        return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')
                  .replace(/"/g,'&quot;').replace(/'/g,'&#039;');
    }

    // ── Initial load ──────────────────────────────────────────
    loadLeaderboard();
</script>
</body>
</html>
