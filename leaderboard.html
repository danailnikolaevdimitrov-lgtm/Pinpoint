<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Pinpoint — Leaderboards</title>
    <link rel="icon" type="image/png" href="assets/logo.png">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
    <link rel="stylesheet" href="css/leaderboard.css">
</head>
<body class="menu-page">

<div class="bg"></div>

<div class="lb-page">

    <div class="lb-header anim anim-d1">
        <h1 class="lb-title">🏆 Leaderboards</h1>
    </div>

    <!-- Leaderboard type tabs -->
    <div class="lb-type-tabs anim anim-d2">
        <button class="lb-type-tab active" data-lb="wins">
            <span class="tab-icon">🥇</span>Most Wins
        </button>
        <button class="lb-type-tab" data-lb="distance">
            <span class="tab-icon">🎯</span>Closest Win
        </button>
        <button class="lb-type-tab" data-lb="attempts">
            <span class="tab-icon">⚡</span>Fewest Attempts
        </button>
    </div>

    <!-- Difficulty sub-tabs -->
    <div class="lb-diff-tabs anim anim-d3">
        <button class="lb-diff-tab" data-diff="tourist">🌿 Tourist</button>
        <button class="lb-diff-tab active" data-diff="navigator">🗺️ Navigator</button>
        <button class="lb-diff-tab" data-diff="legend">⚡ Legend</button>
    </div>

    <!-- Table -->
    <div class="lb-card anim anim-d4">
        <div id="lb-content">
            <div class="lb-state">
                <span class="state-icon">⏳</span>Loading…
            </div>
        </div>
    </div>

</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<script src="js/supabase.js"></script>
<script src="js/navbar.js"></script>
<script src="js/leaderboard.js"></script>
</body>
</html>
